<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Estafas - TalentoTech</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section id="paso-1" class="pantalla">
        <div class="contenido-ajustado">
            <img src="bienvenida.jpg" alt="Bienvenidos" class="img-principal">
            <h1 class="texto-grande">¡Atención Ciudadano de Springfield!</h1>
            <p class="subtitulo">Aprende a no meter la pata con los estafadores.</p>
            <button class="btn-amarillo" onclick="irA(2)">¡Vamos Pá esa!</button>
        </div>
    </section>

    <section id="paso-2" class="pantalla oculto">
        <div class="tarjeta-mision">
            <h2 class="texto-gigante">⚠️ ¡D'oh! Misión Crítica</h2>
            <p class="instruccion-pro">Tu misión es analizar mensajes sospechosos como un experto en ciberseguridad para
                salvar a tus vecinos.</p>
            <p class="pregunta-climax">¿Te atreves a ver el peligro?</p>
            <button class="btn-azul" onclick="irA(3)">¡Echemosle Ojo!</button>
        </div>
    </section>

    <section id="paso-3" class="pantalla oculto">
        <div class="contenedor-simulador">
            <h2 id="titulo-simulador" class="texto-grande">¡Analiza el mensaje, Simpson!</h2>
            <div class="marco-celular">
                <img src="viviana1.jpeg" id="imagen-celular" alt="Imagen de análisis">
            </div>

            <div class="decisiones">
                <h3 class="texto-medio">¿Qué vas a hacer?</h3>
                <div class="botones-grupo">
                    <button class="btn-vibrante btn-peligro" onclick="gestionarDecisión('estafa')">¡Es una estafa!
                        🚩</button>
                    <button class="btn-vibrante btn-seguro" onclick="gestionarDecisión('ignorar')">Parece legal...
                        🤔</button>
                </div>
            </div>
        </div>
    </section>

    <section id="paso-resultado" class="pantalla oculto">
        <div id="tarjeta-resultado" class="tarjeta-resultado">
            <h2 id="titulo-resultado" class="texto-gigante"></h2>
            <div id="mensaje-resultado" class="instruccion-pro"></div>
            <div id="controles-resultado" style="margin-top: 20px;"></div>
        </div>
    </section>

    <script>
        const sonidoAcierto = new Audio('acierto.mp3');
        const sonidoError = new Audio('error.mp3');
        let nivelActual = 1;

        function irA(paso) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.add('oculto'));
            const destino = (typeof paso === 'number') ? 'paso-' + paso : paso;
            document.getElementById(destino).classList.remove('oculto');
        }

        function gestionarDecisión(decisión) {
            const titulo = document.getElementById('titulo-resultado');
            const mensaje = document.getElementById('mensaje-resultado');
            const tarjeta = document.getElementById('tarjeta-resultado');
            const controles = document.getElementById('controles-resultado');

            // NIVEL 1: VIVIANA
            if (nivelActual === 1) {
                if (decisión === 'estafa') {
                    sonidoAcierto.play();
                    tarjeta.className = 'tarjeta-resultado exito';
                    titulo.innerText = "¡Ay caramba!";
                    mensaje.innerHTML = `
                        <strong>¡Nivel 1 Superado!</strong> Detectaste las señales de **Viviana**: <br><br>
                        • El link no es un dominio oficial (.gov.co).<br>
                        • Las entidades no piden pagos por SMS.<br>
                        • ¡Evitaste que robaran sus datos bancarios!
                    `;
                } else {
                    sonidoError.play();
                    tarjeta.className = 'tarjeta-resultado error';
                    titulo.innerText = "¡D'oh!";
                    mensaje.innerHTML = "<strong>¡Caíste!</strong> Viviana explica que este mensaje de Hacienda era un engaño para vaciar su cuenta.";
                }
                controles.innerHTML = `<button class="btn-amarillo" onclick="cargarNivel(2, 'miguel1.jpeg', '¡Analiza el juego de Miguel!')">Siguiente Desafío</button>`;
            }

            // NIVEL 2: MIGUEL
            else if (nivelActual === 2) {
                if (decisión === 'estafa') {
                    sonidoAcierto.play();
                    tarjeta.className = 'tarjeta-resultado exito';
                    titulo.innerText = "¡Excelente!";
                    mensaje.innerHTML = `
                        <strong>¡Nivel 2 Superado!</strong> Como analizó **Miguel**, BlockRust era un peligro:<br><br>
                        • Es un señuelo para instalar malware en Steam.<br>
                        • Busca robar cookies de sesión y contraseñas.<br>
                        • ¡Salvaste la PC de Miguel de un virus!
                    `;
                } else {
                    sonidoError.play();
                    tarjeta.className = 'tarjeta-resultado error';
                    titulo.innerText = "¡Rayos!";
                    mensaje.innerHTML = "<strong>¡Virus instalado!</strong> Miguel confirma que el instalador robó toda la información del equipo.";
                }
                controles.innerHTML = `<button class="btn-amarillo" onclick="cargarNivel(3, 'Rafa.jpg', '¡Analiza el bono de Gil!')">Siguiente Desafío</button>`;
            }

            // NIVEL 3: RAFA (GIL GUNDERSON)
            else if (nivelActual === 3) {
                if (decisión === 'estafa') {
                    sonidoAcierto.play();
                    tarjeta.className = 'tarjeta-resultado exito';
                    titulo.innerText = "¡Genio Total!";
                    mensaje.innerHTML = `
                        <strong>¡Nivel 3 Superado!</strong> Gracias al reto de **Rafa**, Gil aprendió la lección:<br><br>
                        • <b>Enlace Falso:</b> El dominio .xyz es usado por estafadores.<br>
                        • <b>Canal Oficial:</b> Los subsidios se consultan en páginas oficiales, no por SMS.<br>
                        • <b>Protección:</b> ¡Gil no perdió sus ahorros hoy!
                    `;
                } else {
                    sonidoError.play();
                    tarjeta.className = 'tarjeta-resultado error';
                    titulo.innerText = "¡Pobre Gil!";
                    mensaje.innerHTML = `
                        <strong>¡Estafado!</strong> Aunque **Rafa** diseñó este reto para advertirte, Gil entregó su clave y le vaciaron su Nequi.
                    `;
                }
                controles.innerHTML = `<button class="btn-amarillo" onclick="location.reload()">Reiniciar Simulador</button>`;
            }

            irA('paso-resultado');
        }

        function cargarNivel(nivel, imagen, tituloSim) {
            nivelActual = nivel;
            document.getElementById('imagen-celular').src = imagen;
            document.getElementById('titulo-simulador').innerText = tituloSim;
            irA(3);
        }
    </script>
</body>

</html>
